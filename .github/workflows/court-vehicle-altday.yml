name: 법원경매 차량 매일 수집

# 매일 KST 05:30. 차량 docs · photos · 문건 일괄.
# public 레포 무료 한도 무제한 → 격일 → 매일로 변경.
# 부동산 daily 끝난 뒤 충분한 간격. concurrency 그룹 동일 — 우연한 중첩 자동 차단.

on:
  schedule:
    - cron: '30 20 * * *'   # KST 05:30
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  vehicle-docs:
    name: 차량 문서 수집
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 차량 문서 수집 (감정평가서·배당공고·페이지스냅, 매각일 임박)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-vehicle-docs-fetch.js --upload --limit 4

      - name: 차량 문건/송달 (_detail 있는 임박 건)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --category vehicle --limit 6

  vehicle-photos:
    name: 차량 페이지 사진
    runs-on: ubuntu-latest
    timeout-minutes: 70
    needs: vehicle-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 차량 페이지 사진 (PGJ154M00 base64 + PDF 폴백)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-vehicle-photos-from-page.js --upload --limit 4
