name: 법원경매 차량 매일 수집

# 매 6시간 (KST 05:30/11:30/17:30/23:30). 차량 docs · photos · 문건 일괄.
# 차량 매물 사진이 court 직접 URL → 404 다수. photos-from-page collector
# 빈도 + limit 증가로 백필 가속.

on:
  schedule:
    - cron: '30 */3 * * *'   # 매 3시간 (백필 가속 — 5/3 6시간→3시간)
  workflow_dispatch:

concurrency:
  group: court-vehicle   # court-crawl 그룹에서 분리 — 매시간 cron과 충돌 회피
  cancel-in-progress: false

jobs:
  vehicle-docs:
    name: 차량 문서 수집
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 차량 문서 수집 (감정평가서·배당공고·페이지스냅, 매각일 임박)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-vehicle-docs-fetch.js --upload --limit 10

      - name: 차량 문건/송달 (_detail 있는 임박 건)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --category vehicle --limit 10

  vehicle-photos:
    name: 차량 페이지 사진
    runs-on: ubuntu-latest
    timeout-minutes: 70
    needs: vehicle-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 차량 페이지 사진 (PGJ154M00 base64 + PDF 폴백)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-vehicle-photos-from-page.js --upload --limit 30
