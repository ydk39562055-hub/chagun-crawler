name: 법원경매 부동산 임박 우선 수집 (DEPRECATED)

# DEPRECATED: 분할 아키텍처로 대체됨.
#   - detail → court-detail-bulk.yml
#   - 매각PDF → court-spcfc-bulk.yml
#   - 감정평가서 → court-docs-fetch-bulk.yml
#   - 문건/송달 → court-docs-snap-bulk.yml
# full-pipeline 통째 호출은 폴백/수동 dispatch용으로만 유지.

on:
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  realestate-imminent:
    name: 부동산 임박 우선
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 통합 파이프라인 (임박순 _detail 미수집 3건)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node collectors/court-full-pipeline.js --limit 3

      - name: 감정평가서 PDF 보충 (kapanet, _detail 있는 임박 건)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-fetch.js --upload --limit 3

      - name: 부동산 문건/송달 (_detail 있는 임박 건)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --limit 3
