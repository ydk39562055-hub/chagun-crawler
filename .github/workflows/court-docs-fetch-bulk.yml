name: 법원경매 감정평가서 일괄 (매 2시간 V2)

# V2 강화: 매 2시간 KST. kapanet 외부 호출 (법원 사이트 부담 0).
# limit 20씩 12회 = 240건/일.

on:
  schedule:
    - cron: '26 * * * *'   # 매시간 :26 (kapanet 외부 API)
  workflow_dispatch:

concurrency:
  group: court-external
  cancel-in-progress: false

jobs:
  docs-fetch-bulk:
    name: 감정평가서 15건
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts

      - name: 감정평가서 PDF 15건 (kapanet)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-fetch.js --upload --limit 30
