name: 법원경매 사진 재호스트 일괄 (매시간 V2)

# V2 강화: 매시간 KST 50분. limit 10씩 24회/일 = 240건/일.
# court-photo-rehost는 fetch 기반(Playwright X)이라 차단 위험 낮음.

on:
  schedule:
    - cron: '50 * * * *'   # 매시간 50분
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  photo-rehost-bulk:
    name: 사진 재호스트 8건
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 사진 재호스트 8건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-photo-rehost.js --upload --limit 10
