name: 매각물건명세서 PDF 캡처 (c1, 폴백)

# DEPRECATED: court-spcfc-fetch.js 가 ecfs StreamDocs 원본 PDF 직접 다운로드 → 정식.
# 이 워크플로(page.pdf 렌더링)는 폴백용으로만 유지. 자동 실행 제거.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '캡처 건수 (기본 5, 권장 ≤10)'
        required: false
        default: '5'
      upload:
        description: 'true=Storage 업로드, false=로컬 테스트만'
        required: false
        default: 'true'

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - run: npm install
        working-directory: scripts

      - name: Playwright Chromium 설치
        working-directory: scripts
        run: npx playwright install --with-deps chromium

      - name: 부동산 PDF 캡처
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '5' }}"
          UPLOAD="${{ github.event.inputs.upload || 'true' }}"
          FLAGS="--limit $LIMIT --category real_estate"
          if [ "$UPLOAD" = "true" ]; then FLAGS="$FLAGS --upload"; fi
          node collectors/court-pdf-capture.js $FLAGS

      - name: 차량 PDF 캡처
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '5' }}"
          UPLOAD="${{ github.event.inputs.upload || 'true' }}"
          FLAGS="--limit $LIMIT --category vehicle"
          if [ "$UPLOAD" = "true" ]; then FLAGS="$FLAGS --upload"; fi
          node collectors/court-pdf-capture.js $FLAGS

      - name: 로컬 PDF 샘플 아티팩트 업로드 (검증용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-samples-${{ github.run_id }}
          path: scripts/collectors/pdf-out/**
          retention-days: 3
          if-no-files-found: warn
