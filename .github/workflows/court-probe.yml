name: 사건상세조회/등기기록열람 probe (1회)

# 목적: 실제 DOM·네트워크 캡처로 버튼 ID·API 경로 확정.
# 로컬 IP 차단 방지를 위해 GH Actions 에서만 실행.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'probe 버전 (v2 권장)'
        required: false
        type: choice
        default: 'v2'
        options:
          - v1
          - v2
      case:
        description: '사건번호 (예: 2024타경143316)'
        required: false
        default: '2024타경143316'
      court:
        description: '법원 코드 (예: 000272=서울중앙)'
        required: false
        default: '000272'
      saNo:
        description: 'csNo 숫자 (미입력시 case 에서 추출)'
        required: false
        default: ''
      maemul:
        description: 'dspslGdsSeq (물건 번호, 기본 1)'
        required: false
        default: '1'

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - run: npm install
        working-directory: scripts

      - name: Playwright Chromium 설치
        working-directory: scripts
        run: npx playwright install --with-deps chromium

      - name: probe 실행
        working-directory: scripts
        run: |
          FLAGS="--case ${{ inputs.case }} --court ${{ inputs.court }}"
          if [ -n "${{ inputs.saNo }}" ]; then FLAGS="$FLAGS --saNo ${{ inputs.saNo }}"; fi
          if [ "${{ inputs.version }}" = "v2" ]; then
            FLAGS="$FLAGS --maemul ${{ inputs.maemul }}"
            node collectors/court-probe-case-v2.js $FLAGS
          else
            node collectors/court-probe-case.js $FLAGS
          fi

      - name: artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: court-probe-${{ inputs.version }}-${{ github.run_id }}
          path: |
            scripts/collectors/probe-out/**
            scripts/collectors/probe-out-v2/**
          retention-days: 7
          if-no-files-found: warn
