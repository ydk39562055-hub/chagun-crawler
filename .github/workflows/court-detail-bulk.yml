name: 법원경매 detail 일괄 (90일 윈도우 V2)

# V2 강화: 매일 2회 KST 03:30 / 15:30. detail-collect 200건씩.
# 90일 윈도우 + thumbnail_url IS NULL 매물 우선.
# 분할 아키텍처: 기본 정보(사진·비고)만 채움. PDF·등기는 별도 워크플로.

on:
  schedule:
    - cron: '50 */6 * * *'   # 매 6시간 (KST 02:50, 08:50, 14:50, 20:50). photo(:08/:38)·docs-snap(:36)와 시간 분리
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  detail-bulk:
    name: detail-collect 200건
    runs-on: ubuntu-latest
    timeout-minutes: 75   # detail 200건 + tenant-from-curst 200건 직렬. 5/2 45분 timeout 초과 빈발 → 75분으로 상향
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts

      - name: 부동산 detail 100건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-detail-collect.js --upsert --limit 100 --category real_estate

      - name: 차량 detail 100건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-detail-collect.js --upsert --limit 100 --category vehicle

      # detail 직후 1차 등기요약 즉시 추출 — self-process(매시간) 대기 안 함
      - name: 1차 등기요약 즉시 (현황조사서 → atAppraisal)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-tenant-from-curst.js --upload --limit 200
