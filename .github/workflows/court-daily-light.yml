name: 법원경매 매일 가벼운 수집

# 매일 KST 03/09/15/21 (4회). public 레포 무료 한도 무제한 활용.
# 시간대 분산 = 차단 회피 + 데이터 신선도 6시간.
# 사이트 호출 단계는 매각PDF뿐(부+차) — 5건씩 4회 = 일일 40건.

on:
  schedule:
    - cron: '0 18,0,6,12 * * *'   # UTC 18,0,6,12 = KST 03,09,15,21
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  daily-light:
    name: 매각PDF + 자체처리
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright 브라우저 설치
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 매각물건명세서 PDF (매각 7일 전부터 활성)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --limit 5

      - name: 차량 매각물건명세서 PDF
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --category vehicle --limit 5

      - name: 현황조사서 PDF 자체생성 (curstExmn JSON → 렌더 PDF, 사이트 호출 0)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-curst-pdf-generate.js --upload --limit 20

      - name: rgstSummary 파싱 (매각PDF → atSale, 사이트 호출 0)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-rgst-extract.js --upload --limit 20

      - name: 1차 권리분석 (현황조사서 JSON → atAppraisal, 사이트 호출 0)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-tenant-from-curst.js --upload --limit 30

      - name: 차량 매각PDF 파싱 (parsedSpcfc·parsedVehicle, 사이트 호출 0)
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-vehicle-spcfc-extract.js --upload --limit 20
