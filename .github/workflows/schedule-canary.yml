name: Schedule Canary (진단용)

# 단순한 schedule 테스트 — GitHub Actions schedule이 발화되는지 검증.
# 매 5분 cron + 워크플로 자체는 echo만. 발화 자체가 핵심.

on:
  schedule:
    - cron: '*/5 * * * *'   # 매 5분
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - run: echo "schedule 발화됨 - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
