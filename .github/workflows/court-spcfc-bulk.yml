name: 법원경매 매각PDF 일괄 (매시간 V2.5)

# V2.5: 매 30분 → 매시간 :15로 완화 (큐 cancel 회피). limit 10 그대로 = 240건/일 시장 매칭.

on:
  # schedule 제거: GH Actions Ubuntu IP는 streamdocs PDF 다운로드 차단됨(0% 성공).
  # 매각PDF는 로컬에서만 처리 (scripts/local-runner.ps1). 큐 공간을 다른 워크플로에 양보.
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  spcfc-bulk:
    name: 매각PDF 5건 (부+차)
    runs-on: ubuntu-latest
    timeout-minutes: 50   # download timeout 180s 반영 — 사건당 4분 × 20(부+차) + 마진
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 디버그 폴더 준비
        run: mkdir -p ${{ runner.temp }}/spcfc-debug

      - name: 부동산 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPCFC_DEBUG_DIR: ${{ runner.temp }}/spcfc-debug
        run: node collectors/court-spcfc-fetch.js --upload --limit 10

      - name: 차량 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPCFC_DEBUG_DIR: ${{ runner.temp }}/spcfc-debug
        run: node collectors/court-spcfc-fetch.js --upload --category vehicle --limit 10

      - name: 디버그 artifacts 업로드 (실패 진단용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spcfc-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/spcfc-debug
          if-no-files-found: ignore
          retention-days: 7
