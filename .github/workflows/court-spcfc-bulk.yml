name: 법원경매 매각PDF 일괄 (매시간 V2.5)

# V2.5: 매 30분 → 매시간 :15로 완화 (큐 cancel 회피). limit 10 그대로 = 240건/일 시장 매칭.

on:
  schedule:
    - cron: '15 * * * *'   # 매시간 15분
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  spcfc-bulk:
    name: 매각PDF 5건 (부+차)
    runs-on: ubuntu-latest
    timeout-minutes: 25   # limit 10건 실측 9분, 13분 가는 케이스 대비 25분 마진
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --limit 10

      - name: 차량 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --category vehicle --limit 10
