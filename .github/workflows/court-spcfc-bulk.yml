name: 법원경매 매각PDF 일괄 (매 30분 V2)

# V2 강화: 매 30분 KST. limit 10씩 48회/일 = 480건/일 (V1 대비 4배).
# spcfc-fetch는 매각 7일 전부터 활성화되는 PDF — 임박 매물 한정.
# 한 번 실행 머묾 시간 약 8~10분.

on:
  schedule:
    - cron: '0,30 * * * *'   # 매시간 00분, 30분
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  spcfc-bulk:
    name: 매각PDF 5건 (부+차)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --limit 10

      - name: 차량 매각PDF 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-spcfc-fetch.js --upload --category vehicle --limit 10
