name: 법원경매 문건/송달 일괄 (매시간 V2.5)

# V2.5: 매 30분 → 매시간 :45로 완화. limit 10 그대로 = 240건/일.
# spcfc-bulk(:15)와 30분 시차.

on:
  schedule:
    - cron: '36 * * * *'   # 매시간 36분 (GitHub schedule 재인식)
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  docs-snap-bulk:
    name: 문건/송달 5건 (부+차)
    runs-on: ubuntu-latest
    timeout-minutes: 35   # limit 10건 실측 27분 → 35분 마진 (V2.5+)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 문건/송달 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --limit 10

      - name: 차량 문건/송달 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --category vehicle --limit 10
