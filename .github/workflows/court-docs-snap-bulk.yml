name: 법원경매 문건/송달 일괄 (매 30분 V2)

# V2 강화: 매 30분 KST. limit 10씩 48회/일 = 480건/일.
# Playwright 무거움 → 한 번 실행 약 8~10분 머묾.
# spcfc-bulk와 15분 시차 (큐잉 분산).

on:
  schedule:
    - cron: '15,45 * * * *'   # 매시간 15분, 45분
  workflow_dispatch:

concurrency:
  group: court-crawl
  cancel-in-progress: false

jobs:
  docs-snap-bulk:
    name: 문건/송달 5건 (부+차)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - run: npm ci
        working-directory: scripts
      - name: Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: 부동산 문건/송달 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --limit 10

      - name: 차량 문건/송달 5건
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node collectors/court-docs-snap.js --upload --category vehicle --limit 10
